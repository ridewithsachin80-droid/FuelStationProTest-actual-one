<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FuelStation Pro - Complete Fuel Station Management System">
  <title>FuelStation Pro</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2196F3">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .version {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .features {
      text-align: left;
      margin: 30px 0;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    
    .features h3 {
      color: #2196F3;
      margin-bottom: 15px;
      font-size: 16px;
    }
    
    .features ul {
      list-style: none;
      padding: 0;
    }
    
    .features li {
      padding: 8px 0;
      color: #555;
      font-size: 14px;
    }
    
    .features li:before {
      content: "✓ ";
      color: #4CAF50;
      font-weight: bold;
      margin-right: 8px;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 6px;
      color: #2e7d32;
      font-size: 14px;
    }
    
    .button {
      background: #2196F3;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }
    
    .button:hover {
      background: #1976D2;
    }
    
    .loading {
      color: #666;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⛽ FuelStation Pro</h1>
    <p class="version">v1.2.1 Enhanced Edition</p>
    
    <div class="features">
      <h3>🚀 Enhanced Features</h3>
      <ul>
        <li>One-Tap Shift Close</li>
        <li>Smart Alerts</li>
        <li>Auto-Save Drafts</li>
        <li>WhatsApp Integration</li>
        <li>Smart Reports</li>
      </ul>
    </div>
    
    <div class="status" id="status">
      <strong>✓ System Ready</strong><br>
      All features active and operational
    </div>
    
    <button class="button" onclick="checkHealth()">Check System Health</button>
    
    <div class="loading" id="loading" style="display:none;">
      Checking system status...
    </div>
  </div>
  
  <script>
    // Check system health
    async function checkHealth() {
      const status = document.getElementById('status');
      const loading = document.getElementById('loading');
      
      loading.style.display = 'block';
      
      try {
        const response = await fetch('/api/health/detailed');
        const health = await response.json();
        
        loading.style.display = 'none';
        
        if (health.status === 'healthy') {
          status.style.background = '#e8f5e9';
          status.style.color = '#2e7d32';
          status.innerHTML = `
            <strong>✓ All Systems Operational</strong><br>
            Database: ${health.database.status}<br>
            Uptime: ${Math.round(health.uptime / 60)} minutes<br>
            Smart Alerts: ${health.features.smartAlerts ? 'Active' : 'Inactive'}<br>
            WhatsApp: ${health.features.whatsapp ? 'Configured' : 'Not Configured'}
          `;
        } else {
          status.style.background = '#ffebee';
          status.style.color = '#c62828';
          status.innerHTML = '<strong>⚠ System Issue Detected</strong><br>Please check logs';
        }
      } catch (error) {
        loading.style.display = 'none';
        status.style.background = '#ffebee';
        status.style.color = '#c62828';
        status.innerHTML = '<strong>✗ Cannot Connect to Server</strong><br>' + error.message;
      }
    }
    
    // Auto-check on load
    window.addEventListener('load', () => {
      console.log('FuelStation Pro v1.2.1 Enhanced Edition');
      console.log('Features: One-Tap Shift Close, Smart Alerts, Auto-Save, WhatsApp, Smart Reports');
      
      // Check health after 2 seconds
      setTimeout(checkHealth, 2000);
    });
  </script>
  
  <!-- Auto-save functionality -->
  <script src="/autosave.js"></script>
</body>
</html>
