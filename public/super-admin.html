<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendEase — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0d1117;--bg3:#141a24;--card:#161d2a;--card2:#1a2332;--card-h:#1f2b3d;
--border:#1e2a3a;--border2:#283848;--em:#10b981;--em-d:#10b98120;--rose:#f43f5e;--rose-d:#f43f5e20;
--sky:#38bdf8;--sky-d:#38bdf820;--am:#f59e0b;--am-d:#f59e0b20;--vi:#8b5cf6;--vi-d:#8b5cf620;
--t:#e4e8f1;--t2:#8494ad;--t3:#4e5f78;--mono:'IBM Plex Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif;--r:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--t);overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;min-width:260px;animation:tIn .3s ease,tOut .3s ease 3.7s forwards;border-left:4px solid;}
.t-ok{background:#0d2818;border-color:var(--em);color:#6ee7b7;}.t-err{background:#2d0f14;border-color:var(--rose);color:#fda4af;}
.t-info{background:#0c1a2e;border-color:var(--sky);color:#7dd3fc;}
@keyframes tIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes tOut{from{opacity:1;}to{opacity:0;}}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 36px;width:100%;max-width:420px;position:relative;overflow:hidden;}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--vi),var(--sky),var(--em));}
.lhd{text-align:center;margin-bottom:28px;}.lhd .badge{display:inline-block;background:var(--vi-d);color:var(--vi);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:1px;}
.lhd h1{font-family:var(--mono);font-size:22px;font-weight:700;}.lhd p{color:var(--t3);font-size:13px;margin-top:4px;}

/* FORMS */
.fg{margin-bottom:16px;}.fg label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.fi{width:100%;padding:12px 14px;background:#0c1019;border:1px solid var(--border);border-radius:8px;color:var(--t);font-family:var(--sans);font-size:14px;outline:none;transition:all .2s;}
.fi:focus{border-color:var(--vi);box-shadow:0 0 0 3px var(--vi-d);}select.fi{cursor:pointer;appearance:none;}
textarea.fi{resize:vertical;min-height:80px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border:none;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-p{background:linear-gradient(135deg,var(--vi),var(--sky));color:white;width:100%;padding:14px;font-size:15px;}
.btn-s{background:var(--em);color:var(--bg);}.btn-s:hover{opacity:.9;}
.btn-d{background:var(--rose);color:white;}.btn-d:hover{opacity:.9;}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--t2);}.btn-o:hover{background:var(--card);color:var(--t);}
.btn-warn{background:var(--am);color:var(--bg);}
.btn-sm{padding:7px 13px;font-size:12px;}.btn-xs{padding:4px 10px;font-size:11px;}
.bi{width:34px;height:34px;padding:0;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.bi:hover{background:var(--card-h);}

/* LAYOUT */
#app{display:none;height:100vh;overflow:hidden;}
.aw{display:flex;height:100%;}
.sb{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sb-h{padding:18px 14px 14px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:10px;}
.sb-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--vi),var(--sky));display:flex;align-items:center;justify-content:center;font-size:15px;}
.sb-logo h2{font-family:var(--mono);font-size:14px;font-weight:700;}
.sb-badge{font-size:9px;background:var(--vi-d);color:var(--vi);padding:2px 7px;border-radius:10px;margin-top:2px;letter-spacing:.5px;}
.sb-n{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3);padding:12px 12px 5px;}
.sb-i{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s;}
.sb-i:hover{background:var(--bg3);color:var(--t);}.sb-i.on{background:var(--vi-d);color:var(--vi);}
.sb-i .ic{width:16px;text-align:center;font-size:13px;}
.sb-f{padding:10px 8px;border-top:1px solid var(--border);}
.sb-lo{width:100%;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t3);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .2s;}
.sb-lo:hover{background:var(--rose-d);color:var(--rose);border-color:var(--rose);}
.mn{flex:1;overflow-y:auto;background:var(--bg);}
.ph{padding:22px 26px 16px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;}
.ph h1{font-family:var(--mono);font-size:18px;font-weight:700;}.ph p{color:var(--t2);font-size:12px;margin-top:2px;}
.pb{padding:22px 26px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* STATS */
.st{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;position:relative;overflow:hidden;}
.st::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.st.sv::before{background:var(--vi);}.st.se::before{background:var(--em);}.st.sr::before{background:var(--rose);}.st.sa::before{background:var(--am);}
.slb{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.sv2{font-family:var(--mono);font-size:26px;font-weight:700;}
.ssb{font-size:11px;color:var(--t3);margin-top:4px;}

/* CARDS */
.cd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.cdh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cdh h3{font-size:13px;font-weight:700;}.cdb{padding:18px;}.cdb.np{padding:0;}

/* TABLE */
.tw{overflow-x:auto;}table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);background:var(--bg3);border-bottom:1px solid var(--border);}
td{padding:11px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--border);}
tr:last-child td{border:none;}tr:hover td{background:var(--card-h);}

/* BADGES */
.bd{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.be{background:#10b98118;color:#34d399;}.bs{background:#38bdf818;color:#7dd3fc;}
.ba{background:#f59e0b18;color:#fbbf24;}.bro{background:#f43f5e18;color:#fb7185;}
.bv{background:#8b5cf618;color:#a78bfa;}.bg-grey{background:#64748b18;color:#94a3b8;}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.mbg.on{opacity:1;pointer-events:all;}
.mdl{background:var(--card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
.mbg.on .mdl{transform:scale(1);}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mh h3{font-size:15px;font-weight:700;}
.mb{padding:22px;}.mf{padding:12px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;}
.toggle-track{width:40px;height:22px;background:var(--border2);border-radius:11px;position:relative;transition:background .2s;}
.toggle-track.on{background:var(--em);}
.toggle-knob{position:absolute;top:3px;left:3px;width:16px;height:16px;background:white;border-radius:50%;transition:transform .2s;}
.toggle-track.on .toggle-knob{transform:translateX(18px);}
.tab-row{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:16px;}
.tab-btn{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t3);transition:all .2s;}
.tab-btn.on{background:var(--card);color:var(--vi);}
.plan-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;}
.plan-card:hover,.plan-card.sel{border-color:var(--vi);background:var(--vi-d);}
.plan-card .pn{font-size:14px;font-weight:700;}.plan-card .pp{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--em);margin:6px 0;}
.plan-card .pd{font-size:11px;color:var(--t3);}
</style>
</head>
<body>
<div class="toasts" id="toasts"></div>

<!-- LOGIN -->
<div id="login">
<div class="lbox">
  <div class="lhd">
    <div class="badge">SUPER ADMIN</div>
    <h1>AttendEase Platform</h1>
    <p>Platform administration console</p>
  </div>
  <div class="fg"><label>Email</label><input type="email" id="sa-email" class="fi" placeholder="superadmin@attendease.com"></div>
  <div class="fg"><label>Password</label><input type="password" id="sa-pw" class="fi" placeholder="••••••••" onkeydown="if(event.key==='Enter')saLogin()"></div>
  <button class="btn btn-p" onclick="saLogin()">Access Platform →</button>
  <p style="text-align:center;margin-top:12px;font-size:11px;color:var(--t3);">This console is for platform administrators only</p>
</div>
</div>

<!-- APP -->
<div id="app">
  <div class="aw">
    <aside class="sb">
      <div class="sb-h"><div class="sb-logo"><div class="sb-icon">⚡</div><div><h2>AttendEase</h2><div class="sb-badge">SUPER ADMIN</div></div></div></div>
      <nav class="sb-n">
        <div class="sb-sl">Platform</div>
        <div class="sb-i on" onclick="nav('dash')" id="nav-dash"><span class="ic">◈</span>Dashboard</div>
        <div class="sb-i" onclick="nav('companies')" id="nav-companies"><span class="ic">⊞</span>Companies</div>
        <div class="sb-i" onclick="nav('plans')" id="nav-plans"><span class="ic">✦</span>Subscription Plans</div>
        <div class="sb-sl">Reports</div>
        <div class="sb-i" onclick="nav('expiring')" id="nav-expiring"><span class="ic">⏰</span>Expiring Soon</div>
        <div class="sb-i" onclick="nav('activity')" id="nav-activity"><span class="ic">⊛</span>Activity Log</div>
      </nav>
      <div class="sb-f">
        <div style="padding:8px 12px;font-size:12px;color:var(--t3);margin-bottom:6px;" id="sa-name-display">Loading...</div>
        <button class="sb-lo" onclick="saLogout()">⎋ Sign Out</button>
      </div>
    </aside>
    <main class="mn" id="mn"></main>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="mbg" onclick="if(event.target===this)cModal()"><div class="mdl" id="mdl"></div></div>

<script>
const API = '';
let SA_TOKEN = localStorage.getItem('sa_token');
let SA_USER  = null;

function toast(msg, type='success'){
  const t=document.createElement('div');
  t.className=`toast t-${type==='success'?'ok':type==='error'?'err':'info'}`;
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),4200);
}

async function sa(method, path, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(SA_TOKEN) opts.headers['Authorization']='Bearer '+SA_TOKEN;
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(API+'/api/super'+path,opts);
  const data=await res.json();
  if(res.status===401){saLogout();return null;}
  if(!res.ok) throw new Error(data.error||'API error');
  return data;
}

async function saLogin(){
  const email=document.getElementById('sa-email').value.trim();
  const password=document.getElementById('sa-pw').value;
  try{
    const res=await fetch(API+'/api/super/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok) return toast(data.error||'Login failed','error');
    SA_TOKEN=data.token; SA_USER=data.admin;
    localStorage.setItem('sa_token',SA_TOKEN);
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('sa-name-display').textContent=SA_USER.name;
    nav('dash');
  }catch(e){toast('Connection error','error');}
}

function saLogout(){
  SA_TOKEN=null; SA_USER=null;
  localStorage.removeItem('sa_token');
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}

function nav(page){
  document.querySelectorAll('.sb-i').forEach(i=>i.classList.remove('on'));
  const el=document.getElementById('nav-'+page);
  if(el) el.classList.add('on');
  const pages={dash:pDash,companies:pCompanies,plans:pPlans,expiring:pExpiring,activity:pActivity};
  if(pages[page]) pages[page]();
}

function oModal(){document.getElementById('mbg').classList.add('on');}
function cModal(){document.getElementById('mbg').classList.remove('on');}
function setModal(h){document.getElementById('mdl').innerHTML=h;}

function fmt(n){return'₹'+parseInt(n).toLocaleString('en-IN');}
function fdate(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function fdateRel(d){
  if(!d) return'—';
  const diff=Math.ceil((new Date(d)-Date.now())/86400000);
  if(diff<0) return`<span style="color:var(--rose)">Expired ${Math.abs(diff)}d ago</span>`;
  if(diff<=7) return`<span style="color:var(--am)">Expires in ${diff}d</span>`;
  return`<span style="color:var(--em)">Expires in ${diff}d</span>`;
}
function planBadge(code){
  const map={trial:'ba',monthly:'bs',quarterly:'bv',halfyearly:'be',yearly:'bg-grey'};
  return`<span class="bd ${map[code]||'bg-grey'}">${code||'—'}</span>`;
}
function statusBadge(s){
  const map={active:'be',expired:'bro',suspended:'ba',cancelled:'bg-grey',expiring_soon:'ba'};
  return`<span class="bd ${map[s]||'bg-grey'}">${s}</span>`;
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
async function pDash(){
  document.getElementById('mn').innerHTML=`<div class="ph"><div><h1>Dashboard</h1><p>Platform overview</p></div></div><div class="pb"><p style="color:var(--t3)">Loading...</p></div>`;
  try{
    const d=await sa('GET','/dashboard');
    const c=d.companies, s=d.subscriptions, r=d.revenue;
    document.getElementById('mn').innerHTML=`
    <div class="ph"><div><h1>Dashboard</h1><p>Platform overview · ${new Date().toLocaleDateString('en-IN')}</p></div>
    <button class="btn btn-s btn-sm" onclick="showAddCompany()">+ Add Company</button></div>
    <div class="pb">
    <div class="g4" style="margin-bottom:18px;">
      <div class="st sv"><div class="slb">Total Companies</div><div class="sv2">${c.total}</div><div class="ssb">${c.new_this_month} new this month</div></div>
      <div class="st se"><div class="slb">Active</div><div class="sv2">${c.active}</div><div class="ssb">${c.disabled} disabled</div></div>
      <div class="st sa"><div class="slb">Expiring Soon</div><div class="sv2">${s.expiring_soon}</div><div class="ssb">within 7 days</div></div>
      <div class="st sr"><div class="slb">Revenue (30d)</div><div class="sv2">${fmt(r.revenue_this_month)}</div><div class="ssb">Total: ${fmt(r.total_revenue)}</div></div>
    </div>
    <div class="g2">
      <div class="cd"><div class="cdh"><h3>Plan Distribution</h3></div><div class="cdb">
        ${d.plan_distribution.map(p=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:13px">${p.name}</span>
          <span style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--em)">${p.companies}</span>
        </div>`).join('')}
      </div></div>
      <div class="cd"><div class="cdh"><h3>⏰ Expiring Soon</h3></div><div class="cdb">
        ${d.expiring_soon.length===0?'<p style="color:var(--t3);font-size:13px">No companies expiring in next 7 days</p>':
        d.expiring_soon.map(e=>`
        <div style="padding:10px 0;border-bottom:1px solid var(--border);">
          <div style="font-size:13px;font-weight:500">${e.name}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px">${e.plan_name} · ${fdateRel(e.expires_at)}</div>
        </div>`).join('')}
      </div></div>
    </div></div>`;
  }catch(e){toast(e.message,'error');}
}

// ── COMPANIES ──────────────────────────────────────────────────────────────
async function pCompanies(){
  document.getElementById('mn').innerHTML=`<div class="ph"><div><h1>Companies</h1><p>All registered companies</p></div><button class="btn btn-s btn-sm" onclick="showAddCompany()">+ Add Company</button></div><div class="pb"><p style="color:var(--t3)">Loading...</p></div>`;
  try{
    const companies=await sa('GET','/companies');
    document.getElementById('mn').innerHTML=`
    <div class="ph"><div><h1>Companies</h1><p>${companies.length} total</p></div>
    <button class="btn btn-s btn-sm" onclick="showAddCompany()">+ Add Company</button></div>
    <div class="pb"><div class="cd"><div class="cdb np"><div class="tw"><table>
    <thead><tr><th>Company</th><th>Plan</th><th>Employees</th><th>Subscription</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    ${companies.map(c=>`<tr>
      <td><div style="font-weight:600;font-size:13px;color:var(--t)">${c.name}</div><div style="font-size:11px;color:var(--t3)">${c.email}</div></td>
      <td>${planBadge(c.plan_code)}</td>
      <td><span style="font-family:var(--mono)">${c.emp_count||0}</span></td>
      <td>${statusBadge(c.sub_status||'none')}</td>
      <td style="font-size:12px">${fdateRel(c.expires_at)}</td>
      <td>${c.active?'<span class="bd be">Active</span>':'<span class="bd bro">Disabled</span>'}</td>
      <td>
         <div style="display:flex;gap:4px;flex-wrap:wrap;">
          <button class="btn btn-s btn-xs" data-id="${c.id}" data-name="${c.name}" onclick="showCompanyDetail(this.dataset.id,this.dataset.name)">Detail</button>
          <button class="btn btn-xs" style="background:#3b82f6;color:#fff;border:none;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px" data-id="${c.id}" data-name="${c.name}" data-email="${c.email}" data-phone="${c.phone}" data-address="${c.address}" onclick="editCompany(this.dataset)">✏️ Edit</button>
          <button class="btn btn-xs ${c.active?'btn-d':'btn-s'}" data-id="${c.id}" data-name="${c.name}" data-active="${c.active}" onclick="toggleCompany(this.dataset.id,this.dataset.name,this.dataset.active==='true')">${c.active?'Disable':'Enable'}</button>
          <button class="btn btn-xs" style="background:#f59e0b;color:#000;border:none;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px" data-id="${c.id}" data-name="${c.name}" onclick="resetPassword(this.dataset.id,this.dataset.name)">🔑 Reset PW</button>
          <button class="btn btn-xs btn-o" data-id="${c.id}" data-name="${c.name}" onclick="showAssignPlan(this.dataset.id,this.dataset.name)">Plan</button>
          <button class="btn btn-xs" style="background:#10b981;color:#fff;border:none;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px" data-id="${c.id}" data-slug="${c.slug}" onclick="enterCompany(this.dataset.id,this.dataset.slug)">🚪 Enter</button>
          <button class="btn btn-xs" style="background:#ef4444;color:#fff;border:none;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px" data-id="${c.id}" data-name="${c.name}" onclick="deleteCompany(this.dataset.id,this.dataset.name)">🗑️ Delete</button>
        </div>
      </td>
    </tr>`).join('')}
    </tbody></table></div></div></div></div>`;
  }catch(e){toast(e.message,'error');}
}

async function showCompanyDetail(id,name){
  const d=await sa('GET',`/companies/${id}`);

async function toggleCompany(id,name,currentActive){
  if(!confirm(`${currentActive?'Disable':'Enable'} "${name}"? ${currentActive?'All employees will lose access immediately.':''}`)) return;
  try{
    const r=await sa('PATCH',`/companies/${id}/toggle`);
    toast(r.message,'success');
    pCompanies();
  }catch(e){toast(e.message,'error');}
}

async function resetPassword(id,name){
  const pw=prompt(`Set new password for "${name}" admin:\n(minimum 8 characters)`);
  if(!pw) return;
  if(pw.length<8){alert("❌ Password too short! Minimum 8 characters.");return;}
  if(!confirm(`Reset admin password for "${name}" to:\n${pw}\n\nContinue?`)) return;
  try{
    const r=await sa("PATCH",`/companies/${id}/reset-password`,{new_password:pw});
    toast(`✅ Password reset for ${name}!`,"success");
  }catch(e){toast("Reset failed: "+e.message,"error");}
}

async function saveEditCompany(id){
  const name=document.getElementById('ec-name').value.trim();
  const phone=document.getElementById('ec-phone').value.trim();
  const address=document.getElementById('ec-address').value.trim();
  if(!name){alert('Company name is required');return;}
  try{
    await sa('PATCH',`/companies/${id}`,{name,phone,address});
    toast('Company updated successfully','success');
    cModal();
    pCompanies();
  }catch(e){toast('Update failed: '+e.message,'error');}
}

// ── DELETE COMPANY ──────────────────────────────────────────────────────────
async function deleteCompany(id,name){
  const confirm1=confirm(`⚠️ DELETE "${name}"?\n\nThis will permanently delete:\n• All employees\n• All attendance records\n• All departments\n• Subscription data\n\nThis CANNOT be undone!`);
  if(!confirm1)return;
  const typed=prompt(`Type the company name to confirm deletion:\n"${name}"`);
  if(typed!==name){alert('Name did not match. Deletion cancelled.');return;}
  try{
    await sa('DELETE',`/companies/${id}`);
    toast(`${name} has been deleted`,'success');
    pCompanies();
  }catch(e){toast('Delete failed: '+e.message,'error');}
}

function selPlan(el,planId){
  document.querySelectorAll('.plan-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('c-plan-id').value=planId;
}

async function createCompany(){
  const body={
    name:document.getElementById('c-name').value.trim(),
    slug:document.getElementById('c-slug').value.trim(),
    email:document.getElementById('c-email').value.trim(),
    admin_password:document.getElementById('c-pw').value,
    phone:document.getElementById('c-phone').value||undefined,
    address:document.getElementById('c-addr').value||undefined,
    plan_id:document.getElementById('c-plan-id').value,
    custom_max_emp:document.getElementById('c-maxemp').value?parseInt(document.getElementById('c-maxemp').value):undefined,
    custom_price:document.getElementById('c-price').value?parseFloat(document.getElementById('c-price').value):undefined,
  };
  // get plan code
  try{
    const plans=await sa('GET','/plans');
    const plan=plans.find(p=>p.id===body.plan_id);
    body.plan_code=plan?.code||'trial';
    delete body.plan_id;
    const r=await sa('POST','/companies',body);
    toast(`Company "${body.name}" created!`,'success');
    cModal();
    pCompanies();
  }catch(e){toast(e.message,'error');}
}

  <div class="mb">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;" id="assign-plan-grid">
      ${activePlans.map((p,i)=>`
      <div class="plan-card ${i===0?'sel':''}" onclick="selAssignPlan(this,'${p.id}')">
        <div class="pn">${p.name}</div>
        <div class="pp">${p.price_inr>0?fmt(p.price_inr):'Free'}</div>
        <div class="pd">${p.duration_days}d · ${p.max_employees} emp</div>
      </div>`).join('')}
    </div>

    <div class="g2">
      <div class="fg"><label>Action</label><select class="fi" id="ap-action">
        <option value="new">New subscription</option>
        <option value="renew">Renew (extend from current expiry)</option>
        <option value="upgrade">Upgrade</option>
        <option value="downgrade">Downgrade</option>
      </select></div>
      <div class="fg"><label>Custom Price (₹)</label><input type="number" class="fi" id="ap-price" placeholder="Leave blank = plan price" min="0"></div>
    </div>
    <div class="fg"><label>Custom Employee Limit</label><input type="number" class="fi" id="ap-maxemp" placeholder="Leave blank = plan default" min="1"></div>
    <div class="fg"><label>Notes (optional)</label><textarea class="fi" id="ap-notes" placeholder="Payment reference, reason..."></textarea></div>

    <button class="btn btn-s btn-sm" onclick="assignPlan('${tenantId}')">Assign Plan</button>
  </div>`);
  oModal();
}

function selAssignPlan(el,id){
  document.querySelectorAll('#assign-plan-grid .plan-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('ap-plan-id').value=id;
}

async function assignPlan(tenantId){
  const body={
    tenant_id:tenantId,
    plan_id:document.getElementById('ap-plan-id').value,
    action:document.getElementById('ap-action').value,
    notes:document.getElementById('ap-notes').value||undefined,
  };
  const price=document.getElementById('ap-price').value;
  const maxEmp=document.getElementById('ap-maxemp').value;
  if(price) body.price_paid=parseFloat(price);
  if(maxEmp) body.custom_max_emp=parseInt(maxEmp);
  try{
    const r=await sa('POST','/plans/assign',body);
    toast(r.message,'success');
    cModal();
    pCompanies();
  }catch(e){toast(e.message,'error');}
}

async function createPlan(){
  const featureKeys=['qr_attendance','gps','reports','api_access','priority_support','custom_branding'];
  const features={};
  featureKeys.forEach(k=>features[k]=document.getElementById('pf-'+k).checked);
  try{
    await sa('POST','/plans',{
      name:document.getElementById('pn-name').value,
      code:document.getElementById('pn-code').value,
      duration_days:parseInt(document.getElementById('pn-days').value),
      price_inr:parseFloat(document.getElementById('pn-price').value),
      max_employees:parseInt(document.getElementById('pn-emp').value),
      max_departments:parseInt(document.getElementById('pn-dept').value),
      description:document.getElementById('pn-desc').value,
      features,
      is_custom:document.getElementById('pn-custom').checked,
    });
    toast('Plan created','success'); cModal(); pPlans();
  }catch(e){toast(e.message,'error');}
}

    <div class="g2">

async function updatePlan(id){
  try{
    await sa('PUT',`/plans/${id}`,{
      name:document.getElementById('ep-name').value,
      duration_days:parseInt(document.getElementById('ep-days').value),
      price_inr:parseFloat(document.getElementById('ep-price').value),
      max_employees:parseInt(document.getElementById('ep-emp').value),
      description:document.getElementById('ep-desc').value,
      is_active:document.getElementById('ep-active').checked,
    });
    toast('Plan updated','success'); cModal(); pPlans();
  }catch(e){toast(e.message,'error');}
}

// ── AUTO LOGIN ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async ()=>{
  if(SA_TOKEN){
    try{
      const me=await fetch(API+'/api/super/auth/me',{headers:{'Authorization':'Bearer '+SA_TOKEN}}).then(r=>r.json());
      if(me && me.id){
        SA_USER=me;
        document.getElementById('login').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('sa-name-display').textContent=me.name;
        nav('dash');
      } else { localStorage.removeItem('sa_token'); SA_TOKEN=null; }
    }catch(e){ localStorage.removeItem('sa_token'); SA_TOKEN=null; }
  }
});
